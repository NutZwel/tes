    <rect x="495"  y="145" width="5" height="110" rx="2" fill="url(#waveGrad)" opacity="0.7"><animate attributeName="height" values="110;80;140;100;110" dur="3.8s" repeatCount="indefinite"/><animate attributeName="y" values="145;160;130;150;145" dur="3.8s" repeatCount="indefinite"/></rect>

