<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <!-- Glowing accent gradient -->
    <linearGradient id="waveGrad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%"   stop-color="oklch(62% 0.20 255 / 0.35)"/>
      <stop offset="20%"  stop-color="oklch(62% 0.20 255 / 0.75)"/>
      <stop offset="40%"  stop-color="oklch(68% 0.22 260 / 1)"/>
      <stop offset="60%"  stop-color="oklch(68% 0.22 260 / 1)"/>
      <stop offset="80%"  stop-color="oklch(62% 0.20 255 / 0.75)"/>
      <stop offset="100%" stop-color="oklch(62% 0.20 255 / 0.3)"/>
    </linearGradient>

    <!-- Bar glow -->
    <filter id="barGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ambient glow behind entire waveform -->
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="oklch(62% 0.20 255 / 0.08)"/>
      <stop offset="100%" stop-color="oklch(62% 0.20 255 / 0)"/>
    </radialGradient>
  </defs>

  <!-- Ambient glow (subtle) -->
  <rect width="600" height="400" fill="url(#ambientGlow)"/>

  <!--
    Dense equalizer bars. 60 bars, each 5px wide with 5px gap = 600px.
    Heights range from 30px to 280px (out of 400px max).
    Each bar has its own animation for organic movement.
  -->
  <g filter="url(#barGlow)">
    <!-- Each row: x, baseHeight, animDur(unique) -->

    <!-- Bass (left) — tall, slow -->
    <rect x="5"    y="160" width="5" height="80"  rx="2" fill="url(#waveGrad)" opacity="0.7"><animate attributeName="height" values="80;120;60;100;80" dur="3.2s" repeatCount="indefinite"/><animate attributeName="y" values="160;140;170;150;160" dur="3.2s" repeatCount="indefinite"/></rect>
    <rect x="15"   y="130" width="5" height="140" rx="2" fill="url(#waveGrad)" opacity="0.8"><animate attributeName="height" values="140;180;110;160;140" dur="2.8s" repeatCount="indefinite"/><animate attributeName="y" values="130;110;145;120;130" dur="2.8s" repeatCount="indefinite"/></rect>
    <rect x="25"   y="100" width="5" height="200" rx="2" fill="url(#waveGrad)" opacity="0.9"><animate attributeName="height" values="200;240;170;220;200" dur="3.5s" repeatCount="indefinite"/><animate attributeName="y" values="100;80;115;90;100" dur="3.5s" repeatCount="indefinite"/></rect>
    <rect x="35"   y="110" width="5" height="180" rx="2" fill="url(#waveGrad)" opacity="0.85"><animate attributeName="height" values="180;220;150;200;180" dur="2.5s" repeatCount="indefinite"/><animate attributeName="y" values="110;90;125;100;110" dur="2.5s" repeatCount="indefinite"/></rect>
    <rect x="45"   y="140" width="5" height="120" rx="2" fill="url(#waveGrad)" opacity="0.75"><animate attributeName="height" values="120;160;90;140;120" dur="3.8s" repeatCount="indefinite"/><animate attributeName="y" values="140;120;155;130;140" dur="3.8s" repeatCount="indefinite"/></rect>

    <rect x="55"   y="90"  width="5" height="220" rx="2" fill="url(#waveGrad)" opacity="0.95"><animate attributeName="height" values="220;260;190;240;220" dur="2.2s" repeatCount="indefinite"/><animate attributeName="y" values="90;70;105;80;90" dur="2.2s" repeatCount="indefinite"/></rect>
    <rect x="65"   y="120" width="5" height="160" rx="2" fill="url(#waveGrad)" opacity="0.8"><animate attributeName="height" values="160;200;130;180;160" dur="3.0s" repeatCount="indefinite"/><animate attributeName="y" values="120;100;135;110;120" dur="3.0s" repeatCount="indefinite"/></rect>
    <rect x="75"   y="80"  width="5" height="240" rx="2" fill="url(#waveGrad)" opacity="1"><animate attributeName="height" values="240;280;210;260;240" dur="2.6s" repeatCount="indefinite"/><animate attributeName="y" values="80;60;95;70;80" dur="2.6s" repeatCount="indefinite"/></rect>
    <rect x="85"   y="105" width="5" height="190" rx="2" fill="url(#waveGrad)" opacity="0.85"><animate attributeName="height" values="190;230;160;210;190" dur="3.3s" repeatCount="indefinite"/><animate attributeName="y" values="105;85;120;95;105" dur="3.3s" repeatCount="indefinite"/></rect>
    <rect x="95"   y="135" width="5" height="130" rx="2" fill="url(#waveGrad)" opacity="0.7"><animate attributeName="height" values="130;170;100;150;130" dur="3.7s" repeatCount="indefinite"/><animate attributeName="y" values="135;115;150;125;135" dur="3.7s" repeatCount="indefinite"/></rect>

    <!-- Low-mid -->
    <rect x="105"  y="145" width="5" height="110" rx="2" fill="url(#waveGrad)" opacity="0.7"><animate attributeName="height" values="110;150;80;130;110" dur="4.0s" repeatCount="indefinite"/><animate attributeName="y" values="145;125;160;135;145" dur="4.0s" repeatCount="indefinite"/></rect>
    <rect x="115"  y="100" width="5" height="200" rx="2" fill="url(#waveGrad)" opacity="0.9"><animate attributeName="height" values="200;170;230;190;200" dur="2.4s" repeatCount="indefinite"/><animate attributeName="y" values="100;115;85;105;100" dur="2.4s" repeatCount="indefinite"/></rect>
    <rect x="125"  y="125" width="5" height="150" rx="2" fill="url(#waveGrad)" opacity="0.8"><animate attributeName="height" values="150;190;120;170;150" dur="3.1s" repeatCount="indefinite"/><animate attributeName="y" values="125;105;140;115;125" dur="3.1s" repeatCount="indefinite"/></rect>
    <rect x="135"  y="90"  width="5" height="220" rx="2" fill="url(#waveGrad)" opacity="0.9"><animate attributeName="height" values="220;250;190;230;220" dur="2.9s" repeatCount="indefinite"/><animate attributeName="y" values="90;75;105;85;90" dur="2.9s" repeatCount="indefinite"/></rect>
    <rect x="145"  y="150" width="5" height="100" rx="2" fill="url(#waveGrad)" opacity="0.65"><animate attributeName="height" values="100;140;70;120;100" dur="3.9s" repeatCount="indefinite"/><animate attributeName="y" values="150;130;165;140;150" dur="3.9s" repeatCount="indefinite"/></rect>

    <rect x="155"  y="115" width="5" height="170" rx="2" fill="url(#waveGrad)" opacity="0.8"><animate attributeName="height" values="170;210;140;190;170" dur="2.7s" repeatCount="indefinite"/><animate attributeName="y" values="115;95;130;105;115" dur="2.7s" repeatCount="indefinite"/></rect>
    <rect x="165"  y="80"  width="5" height="240" rx="2" fill="url(#waveGrad)" opacity="1"><animate attributeName="height" values="240;270;210;250;240" dur="2.1s" repeatCount="indefinite"/><animate attributeName="y" values="80;65;95;75;80" dur="2.1s" repeatCount="indefinite"/></rect>
    <rect x="175"  y="140" width="5" height="120" rx="2" fill="url(#waveGrad)" opacity="0.75"><animate attributeName="height" values="120;160;90;140;120" dur="3.6s" repeatCount="indefinite"/><animate attributeName="y" values="140;120;155;130;140" dur="3.6s" repeatCount="indefinite"/></rect>
    <rect x="185"  y="105" width="5" height="190" rx="2" fill="url(#waveGrad)" opacity="0.85"><animate attributeName="height" values="190;160;220;180;190" dur="2.3s" repeatCount="indefinite"/><animate attributeName="y" values="105;120;90;110;105" dur="2.3s" repeatCount="indefinite"/></rect>
    <rect x="195"  y="130" width="5" height="140" rx="2" fill="url(#waveGrad)" opacity="0.8"><animate attributeName="height" values="140;180;110;160;140" dur="3.4s" repeatCount="indefinite"/><animate attributeName="y" values="130;110;145;120;130" dur="3.4s" repeatCount="indefinite"/></rect>

    <!-- Mid (center) — varied -->
    <rect x="205"  y="95"  width="5" height="210" rx="2" fill="url(#waveGrad)" opacity="0.9"><animate attributeName="height" values="210;180;240;200;210" dur="2.6s" repeatCount="indefinite"/><animate attributeName="y" values="95;110;80;100;95" dur="2.6s" repeatCount="indefinite"/></rect>
    <rect x="215"  y="155" width="5" height="90"  rx="2" fill="url(#waveGrad)" opacity="0.6"><animate attributeName="height" values="90;130;60;110;90" dur="4.1s" repeatCount="indefinite"/><animate attributeName="y" values="155;135;170;145;155" dur="4.1s" repeatCount="indefinite"/></rect>
    <rect x="225"  y="85"  width="5" height="230" rx="2" fill="url(#waveGrad)" opacity="0.95"><animate attributeName="height" values="230;260;200;240;230" dur="2.0s" repeatCount="indefinite"/><animate attributeName="y" values="85;70;100;80;85" dur="2.0s" repeatCount="indefinite"/></rect>
    <rect x="235"  y="120" width="5" height="160" rx="2" fill="url(#waveGrad)" opacity="0.8"><animate attributeName="height" values="160;130;190;150;160" dur="3.7s" repeatCount="indefinite"/><animate attributeName="y" values="120;135;105;125;120" dur="3.7s" repeatCount="indefinite"/></rect>
    <rect x="245"  y="145" width="5" height="110" rx="2" fill="url(#waveGrad)" opacity="0.7"><animate attributeName="height" values="110;80;140;100;110" dur="3.5s" repeatCount="indefinite"/><animate attributeName="y" values="145;160;130;150;145" dur="3.5s" repeatCount="indefinite"/></rect>

    <rect x="255"  y="100" width="5" height="200" rx="2" fill="url(#waveGrad)" opacity="0.9"><animate attributeName="height" values="200;230;170;210;200" dur="2.8s" repeatCount="indefinite"/><animate attributeName="y" values="100;85;115;95;100" dur="2.8s" repeatCount="indefinite"/></rect>
    <rect x="265"  y="70"  width="5" height="260" rx="2" fill="url(#waveGrad)" opacity="1"><animate attributeName="height" values="260;290;230;270;260" dur="1.9s" repeatCount="indefinite"/><animate attributeName="y" values="70;55;85;65;70" dur="1.9s" repeatCount="indefinite"/></rect>
    <rect x="275"  y="135" width="5" height="130" rx="2" fill="url(#waveGrad)" opacity="0.75"><animate attributeName="height" values="130;170;100;150;130" dur="3.3s" repeatCount="indefinite"/><animate attributeName="y" values="135;115;150;125;135" dur="3.3s" repeatCount="indefinite"/></rect>
    <rect x="285"  y="110" width="5" height="180" rx="2" fill="url(#waveGrad)" opacity="0.85"><animate attributeName="height" values="180;150;210;170;180" dur="2.5s" repeatCount="indefinite"/><animate attributeName="y" values="110;125;95;115;110" dur="2.5s" repeatCount="indefinite"/></rect>
    <rect x="295"  y="125" width="5" height="150" rx="2" fill="url(#waveGrad)" opacity="0.8"><animate attributeName="height" values="150;180;120;160;150" dur="3.1s" repeatCount="indefinite"/><animate attributeName="y" values="125;110;140;120;125" dur="3.1s" repeatCount="indefinite"/></rect>

    <!-- Center peak -->
    <rect x="305"  y="125" width="5" height="150" rx="2" fill="url(#waveGrad)" opacity="0.8"><animate attributeName="height" values="150;120;180;140;150" dur="3.4s" repeatCount="indefinite"/><animate attributeName="y" values="125;140;110;130;125" dur="3.4s" repeatCount="indefinite"/></rect>
    <rect x="315"  y="110" width="5" height="180" rx="2" fill="url(#waveGrad)" opacity="0.85"><animate attributeName="height" values="180;210;150;190;180" dur="2.2s" repeatCount="indefinite"/><animate attributeName="y" values="110;95;125;105;110" dur="2.2s" repeatCount="indefinite"/></rect>
    <rect x="325"  y="135" width="5" height="130" rx="2" fill="url(#waveGrad)" opacity="0.75"><animate attributeName="height" values="130;90;160;110;130" dur="3.9s" repeatCount="indefinite"/><animate attributeName="y" values="135;155;120;145;135" dur="3.9s" repeatCount="indefinite"/></rect>
    <rect x="335"  y="70"  width="5" height="260" rx="2" fill="url(#waveGrad)" opacity="1"><animate attributeName="height" values="260;230;290;250;260" dur="1.7s" repeatCount="indefinite"/><animate attributeName="y" values="70;85;55;75;70" dur="1.7s" repeatCount="indefinite"/></rect>
    <rect x="345"  y="100" width="5" height="200" rx="2" fill="url(#waveGrad)" opacity="0.9"><animate attributeName="height" values="200;170;230;190;200" dur="3.0s" repeatCount="indefinite"/><animate attributeName="y" values="100;115;85;105;100" dur="3.0s" repeatCount="indefinite"/></rect>

    <rect x="355"  y="145" width="5" height="110" rx="2" fill="url(#waveGrad)" opacity="0.7"><animate attributeName="height" values="110;140;80;120;110" dur="3.6s" repeatCount="indefinite"/><animate attributeName="y" values="145;130;160;140;145" dur="3.6s" repeatCount="indefinite"/></rect>
    <rect x="365"  y="120" width="5" height="160" rx="2" fill="url(#waveGrad)" opacity="0.8"><animate attributeName="height" values="160;130;190;150;160" dur="3.8s" repeatCount="indefinite"/><animate attributeName="y" values="120;135;105;125;120" dur="3.8s" repeatCount="indefinite"/></rect>
    <rect x="375"  y="85"  width="5" height="230" rx="2" fill="url(#waveGrad)" opacity="0.95"><animate attributeName="height" values="230;200;260;220;230" dur="2.4s" repeatCount="indefinite"/><animate attributeName="y" values="85;100;70;90;85" dur="2.4s" repeatCount="indefinite"/></rect>
    <rect x="385"  y="155" width="5" height="90"  rx="2" fill="url(#waveGrad)" opacity="0.6"><animate attributeName="height" values="90;120;60;100;90" dur="4.2s" repeatCount="indefinite"/><animate attributeName="y" values="155;140;170;150;155" dur="4.2s" repeatCount="indefinite"/></rect>
    <rect x="395"  y="95"  width="5" height="210" rx="2" fill="url(#waveGrad)" opacity="0.9"><animate attributeName="height" values="210;240;180;220;210" dur="2.7s" repeatCount="indefinite"/><animate attributeName="y" values="95;80;110;90;95" dur="2.7s" repeatCount="indefinite"/></rect>

    <!-- High-mid (right) — shorter, faster -->
    <rect x="405"  y="130" width="5" height="140" rx="2" fill="url(#waveGrad)" opacity="0.8"><animate attributeName="height" values="140;170;110;150;140" dur="3.2s" repeatCount="indefinite"/><animate attributeName="y" values="130;115;145;125;130" dur="3.2s" repeatCount="indefinite"/></rect>
    <rect x="415"  y="105" width="5" height="190" rx="2" fill="url(#waveGrad)" opacity="0.85"><animate attributeName="height" values="190;160;220;180;190" dur="2.9s" repeatCount="indefinite"/><animate attributeName="y" values="105;120;90;110;105" dur="2.9s" repeatCount="indefinite"/></rect>
    <rect x="425"  y="140" width="5" height="120" rx="2" fill="url(#waveGrad)" opacity="0.75"><animate attributeName="height" values="120;90;150;110;120" dur="3.5s" repeatCount="indefinite"/><animate attributeName="y" values="140;155;125;145;140" dur="3.5s" repeatCount="indefinite"/></rect>
    <rect x="435"  y="80"  width="5" height="240" rx="2" fill="url(#waveGrad)" opacity="1"><animate attributeName="height" values="240;210;270;230;240" dur="2.1s" repeatCount="indefinite"/><animate attributeName="y" values="80;95;65;85;80" dur="2.1s" repeatCount="indefinite"/></rect>
    <rect x="445"  y="115" width="5" height="170" rx="2" fill="url(#waveGrad)" opacity="0.8"><animate attributeName="height" values="170;200;140;180;170" dur="2.5s" repeatCount="indefinite"/><animate attributeName="y" values="115;100;130;110;115" dur="2.5s" repeatCount="indefinite"/></rect>

    <rect x="455"  y="150" width="5" height="100" rx="2" fill="url(#waveGrad)" opacity="0.65"><animate attributeName="height" values="100;130;70;110;100" dur="4.0s" repeatCount="indefinite"/><animate attributeName="y" values="150;135;165;145;150" dur="4.0s" repeatCount="indefinite"/></rect>
    <rect x="465"  y="90"  width="5" height="220" rx="2" fill="url(#waveGrad)" opacity="0.9"><animate attributeName="height" values="220;250;190;230;220" dur="2.3s" repeatCount="indefinite"/><animate attributeName="y" values="90;75;105;85;90" dur="2.3s" repeatCount="indefinite"/></rect>
